version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      maven-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Spring AI 2.0.0-Mx are milestone releases; bump manually.
      - dependency-name: "org.springframework.ai:*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
